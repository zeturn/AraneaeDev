name: GHCR + k3s CI/CD

on:
  push:
    branches: [main, deploy]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CONFIG_FILE: .github/cicd-images.json

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config
        run: |
          test -f "${CONFIG_FILE}"
          jq -e '.project and .images and (.images | length > 0)' "${CONFIG_FILE}" >/dev/null

      - name: Build matrix
        id: matrix
        run: |
          MATRIX_JSON=$(jq -c '{include: [.images[] | {name, context, dockerfile, build_args: (.build_args // "")}]}' "${CONFIG_FILE}")
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  build_and_push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image prefix
        id: meta
        shell: bash
        run: |
          PROJECT_SLUG=$(jq -r '.project' "${CONFIG_FILE}")
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_prefix=ghcr.io/${OWNER_LC}/${PROJECT_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-${{ matrix.name }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_prefix }}-${{ matrix.name }}:latest

  deploy_k3s:
    needs: build_and_push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to deploy branch
        shell: bash
        run: |
          git fetch origin deploy --depth=1
          TAG_SHA=$(git rev-list -n 1 "${GITHUB_REF}")
          if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/deploy"; then
            echo "Tag commit is not contained in origin/deploy, skip deployment."
            exit 1
          fi

      - name: Configure kubeconfig
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is required"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy workloads
        shell: bash
        run: |
          PROJECT_SLUG=$(jq -r '.project' "${CONFIG_FILE}")
          NAMESPACE=$(jq -r '.namespace // .project' "${CONFIG_FILE}")
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          GHCR_PASSWORD="${{ secrets.GITHUB_TOKEN }}"

          kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${NAMESPACE}"

          kubectl -n "${NAMESPACE}" create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="${OWNER_LC}" \
            --docker-password="${GHCR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

          jq -c '.images[]' "${CONFIG_FILE}" | while read -r item; do
            NAME=$(jq -r '.name' <<< "${item}")
            KIND=$(jq -r '.kind // "deployment"' <<< "${item}")
            PORT=$(jq -r '.port // empty' <<< "${item}")
            REPLICAS=$(jq -r '.replicas // 1' <<< "${item}")
            IMAGE="ghcr.io/${OWNER_LC}/${PROJECT_SLUG}-${NAME}:${GITHUB_SHA}"

            if [ "${KIND}" = "job" ]; then
              kubectl -n "${NAMESPACE}" delete job "${PROJECT_SLUG}-${NAME}" --ignore-not-found=true
              kubectl -n "${NAMESPACE}" create job "${PROJECT_SLUG}-${NAME}" \
                --image="${IMAGE}" \
                --dry-run=client -o yaml | kubectl apply -f -
              continue
            fi

            kubectl -n "${NAMESPACE}" create deployment "${PROJECT_SLUG}-${NAME}" \
              --image="${IMAGE}" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl -n "${NAMESPACE}" scale deployment/${PROJECT_SLUG}-${NAME} --replicas="${REPLICAS}"

            if [ -n "${PORT}" ]; then
              kubectl -n "${NAMESPACE}" create service clusterip "${PROJECT_SLUG}-${NAME}" \
                --tcp="${PORT}:${PORT}" \
                --dry-run=client -o yaml | kubectl apply -f -
            fi

            kubectl -n "${NAMESPACE}" rollout status deployment/${PROJECT_SLUG}-${NAME} --timeout=180s
          done
