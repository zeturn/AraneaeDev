services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ./Backend/data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 10s

  controlnode:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        TARGET: control
    image: araneae-control:local
    restart: unless-stopped
    volumes:
      - ./Backend/data:/data
    environment:
      ARANEAE_ENV: ${ARANEAE_ENV:-production}
      RABBITMQ_URL: ${CONTROL_RABBITMQ_URL:-amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      CONTROL_HTTP_ADDR: ${CONTROL_HTTP_ADDR:-:8180}
      CONTROL_GRPC_ADDR: ${CONTROL_GRPC_ADDR:-:9190}
      CONTROL_GRPC_TLS_ENABLED: ${CONTROL_GRPC_TLS_ENABLED:-true}
      CONTROL_GRPC_TLS_CERT_FILE: ${CONTROL_GRPC_TLS_CERT_FILE:-}
      CONTROL_GRPC_TLS_KEY_FILE: ${CONTROL_GRPC_TLS_KEY_FILE:-}
      CONTROL_GRPC_TLS_CLIENT_CA_FILE: ${CONTROL_GRPC_TLS_CLIENT_CA_FILE:-}
      CONTROL_DB_PATH: ${CONTROL_DB_PATH:-/data/control.db}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:?set INIT_ADMIN_PASSWORD to a strong value}
      CONTROL_JWT_SECRET: ${CONTROL_JWT_SECRET:?set CONTROL_JWT_SECRET to a strong random value}
      EXECUTION_CALLBACK_KEY: ${EXECUTION_CALLBACK_KEY:?set EXECUTION_CALLBACK_KEY to a strong shared key}
      CONTROL_NODE_VERIFY_SCHEME: ${CONTROL_NODE_VERIFY_SCHEME:-https}
      CONTROL_CORS_ALLOW_ORIGINS: ${CONTROL_CORS_ALLOW_ORIGINS:?set CONTROL_CORS_ALLOW_ORIGINS to trusted frontend origins}
    ports:
      - "${CONTROL_HTTP_PORT:-8180}:8180"
      - "${CONTROL_GRPC_PORT:-9190}:9190"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8180; printf \"GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  front:
    build:
      context: ./Frontend
      args:
        VITE_BACKEND_BASE_URL: ${FRONT_VITE_BACKEND_BASE_URL:-http://localhost:8180}
        VITE_API_FLAVOR: ${FRONT_VITE_API_FLAVOR:-go}
    image: araneae-front:local
    restart: unless-stopped
    ports:
      - "${FRONT_HTTP_PORT:-5109}:80"
    depends_on:
      controlnode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
