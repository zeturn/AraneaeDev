services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 10s

  controlnode:
    image: golang:1.25
    working_dir: /app
    command: sh -c "go mod download && go run ./cmd/control"
    restart: unless-stopped
    volumes:
      - ./Backend:/app
      - ./Backend/data:/data
    environment:
      RABBITMQ_URL: ${CONTROL_RABBITMQ_URL:-amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      CONTROL_HTTP_ADDR: ${CONTROL_HTTP_ADDR:-:8180}
      CONTROL_GRPC_ADDR: ${CONTROL_GRPC_ADDR:-:9190}
      CONTROL_DB_PATH: ${CONTROL_DB_PATH:-/data/control.db}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      EXECUTION_CALLBACK_KEY: ${EXECUTION_CALLBACK_KEY:-change-me-callback}
      CONTROL_CORS_ALLOW_ORIGINS: ${CONTROL_CORS_ALLOW_ORIGINS:-http://localhost:5109,http://127.0.0.1:5109}
    ports:
      - "${CONTROL_HTTP_PORT:-8180}:8180"
      - "${CONTROL_GRPC_PORT:-9190}:9190"
    depends_on:
      rabbitmq:
        condition: service_healthy

  front:
    build:
      context: ./Frontend
      args:
        VITE_BACKEND_BASE_URL: ${FRONT_VITE_BACKEND_BASE_URL:-http://localhost:8180}
        VITE_API_FLAVOR: ${FRONT_VITE_API_FLAVOR:-go}
    restart: unless-stopped
    ports:
      - "${FRONT_HTTP_PORT:-5109}:80"
    depends_on:
      controlnode:
        condition: service_started
