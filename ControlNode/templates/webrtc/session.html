<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Araneae WebRTC 控制台</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", "Apple Color Emoji", "Segoe UI Emoji"; margin: 0; background: #0b0c10; color: #e5e7eb; }
    header { padding: 12px 16px; background: #111827; display:flex; align-items:center; gap:12px; }
    header input, header button { padding: 6px 10px; border-radius: 6px; border: 1px solid #374151; background:#111827; color:#e5e7eb; }
    header button { cursor: pointer; background:#2563eb; border-color:#2563eb; }
    main { padding: 12px; display: grid; grid-template-columns: 1fr 320px; gap: 12px; }
    video { width: 100%; background:#111; border:1px solid #374151; border-radius:8px; }
    .panel { border:1px solid #374151; border-radius:8px; padding:10px; background:#111827; }
    .status { font-size: 12px; color:#9ca3af; }
    label { display:block; margin: 8px 0 4px; color:#9ca3af; }
    textarea { width:100%; height:120px; background:#0f172a; color:#e5e7eb; border:1px solid #374151; border-radius:6px; padding:8px; }
  </style>
</head>
<body>
<header>
  <div>Execution Host:</div>
  <input id="execHost" value="{{ exec_host }}" style="min-width:360px"/>
  <div>Session:</div>
  <input id="sessionId" value="{{ session_id }}" style="min-width:200px"/>
  <button id="btnConnect">连接</button>
  <button id="btnResume">我已完成（Resume）</button>
  <span class="status" id="status">{% if error %}{{ error }}{% else %}就绪{% endif %}</span>
</header>
<main>
  <div>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>
  <div class="panel">
    <div><strong>说明</strong></div>
    <p>鼠标与键盘事件将通过 DataChannel('ctrl') 注入到远端 Playwright 页面。</p>
    <label>日志</label>
    <textarea id="log" readonly></textarea>
  </div>
</main>
<script>
  const logEl = document.getElementById('log');
  const statusEl = document.getElementById('status');
  function log(...args) { logEl.value += args.join(' ') + '\n'; logEl.scrollTop = logEl.scrollHeight; }
  function setStatus(t) { statusEl.textContent = t; }
  const NODE_API_TOKEN = "{{ node_api_token|default:''|escapejs }}";
  function authHeaders(base = {}) {
    const h = { ...base };
    if (NODE_API_TOKEN) {
      h['X-Araneae-Node-Token'] = NODE_API_TOKEN;
    }
    return h;
  }

  let pc = null;
  let ctrl = null;

  async function connect() {
    const execHost = document.getElementById('execHost').value.trim();
    const sessionId = document.getElementById('sessionId').value.trim();
    if (!execHost || !sessionId) { setStatus('需要 Execution Host 与 Session'); return; }
    setStatus('建立连接中…');

    pc = new RTCPeerConnection({
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
    });

    // 收视频
    pc.addTransceiver('video', { direction: 'recvonly' });
    const video = document.getElementById('remoteVideo');
    pc.ontrack = (e) => {
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
      } else {
        const stream = new MediaStream([e.track]);
        video.srcObject = stream;
      }
      setStatus('视频已接入');
    };

    // 控制通道（前端创建）
    ctrl = pc.createDataChannel('ctrl');
    ctrl.onopen = () => { log('[ctrl] open'); };
    ctrl.onclose = () => { log('[ctrl] close'); };

    // 采集鼠标/键盘事件
    bindControls(video);

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const res = await fetch(`${execHost}/webrtc/offer`, {
      method: 'POST', headers: authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify({ session_id: sessionId, sdp: offer.sdp, type: offer.type })
    });
    if (!res.ok) {
      setStatus('Offer 提交失败');
      log('Offer failed', await res.text());
      return;
    }
    const answer = await res.json();
    await pc.setRemoteDescription(answer);
    setStatus('连接已建立');
  }

  function bindControls(surface){
    surface.addEventListener('mousemove', (e)=>{
      const {left, top, width, height} = surface.getBoundingClientRect();
      const x = Math.max(0, Math.min(1279, Math.round((e.clientX - left) * 1280 / width)));
      const y = Math.max(0, Math.min(719,  Math.round((e.clientY - top) * 720  / height)));
      sendCtrl({type:'mouse', action:'move', x, y});
    });
    surface.addEventListener('mousedown', (e)=>{
      sendCtrl({type:'mouse', action:'down', button: mouseButton(e.button)});
    });
    surface.addEventListener('mouseup', (e)=>{
      sendCtrl({type:'mouse', action:'up', button: mouseButton(e.button)});
    });
    surface.addEventListener('click', (e)=>{
      const {left, top, width, height} = surface.getBoundingClientRect();
      const x = Math.max(0, Math.min(1279, Math.round((e.clientX - left) * 1280 / width)));
      const y = Math.max(0, Math.min(719,  Math.round((e.clientY - top) * 720  / height)));
      sendCtrl({type:'mouse', action:'click', x, y, button: mouseButton(e.button)});
    });
    surface.addEventListener('wheel', (e)=>{
      sendCtrl({type:'mouse', action:'wheel', deltaX: e.deltaX, deltaY: e.deltaY});
    }, {passive:true});

    window.addEventListener('keydown', (e)=>{
      if (e.repeat) return; // avoid flooding
      sendCtrl({type:'keyboard', action:'down', key: e.key});
    });
    window.addEventListener('keyup', (e)=>{
      sendCtrl({type:'keyboard', action:'up', key: e.key});
    });
  }

  function mouseButton(btn){
    return btn === 0 ? 'left' : btn === 1 ? 'middle' : 'right';
  }

  function sendCtrl(obj){
    if (ctrl && ctrl.readyState === 'open') {
      ctrl.send(JSON.stringify(obj));
    }
  }

  document.getElementById('btnConnect').addEventListener('click', connect);
  document.getElementById('btnResume').addEventListener('click', async ()=>{
    const execHost = document.getElementById('execHost').value.trim();
    const sessionId = document.getElementById('sessionId').value.trim();
    sendCtrl({type:'resume'});
    try {
      await fetch(`${execHost}/webrtc/resume/${sessionId}`, { method:'POST', headers: authHeaders() });
      setStatus('已发送 Resume');
    } catch(err){ log('resume failed', err); }
  });
</script>
</body>
</html>
