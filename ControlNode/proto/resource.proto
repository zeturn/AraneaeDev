syntax = "proto3";

package araneae.resource;

// 单个节点的资源状态
message ResourceUsage {
  string node_id = 1;           // 节点唯一标识
  double cpu_percent = 2;       // CPU 使用率（%）
  uint64 memory_used = 3;       // 已用内存（字节）
  uint64 memory_total = 4;      // 总内存（字节）
  repeated GpuUsage gpus = 5;   // GPU 使用情况列表
  int64 timestamp = 6;          // UNIX 时间戳（毫秒）
}

// 单个 GPU 的状态
message GpuUsage {
  int32 index = 1;              // GPU 编号
  uint64 gpu_mem_used = 2;      // 已用显存（字节）
  uint64 gpu_mem_total = 3;     // 总显存（字节）
  double gpu_util = 4;          // GPU 利用率（%）
}

// 用于订阅/推送资源状态的请求
message SubscribeRequest {
  string node_id = 1;           // 要监控的节点 ID
}

// gRPC 服务定义
service ResourceMonitor {
  // Exec 端作为 Server，管理端作为 Client 发起订阅，
  // Server 持续推送 ResourceUsage 消息
  rpc Subscribe(SubscribeRequest) returns (stream ResourceUsage);
}
