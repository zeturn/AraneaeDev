services:
  controlnode:
    build:
      context: ./ControlNode
    mem_limit: 1536m
    cpus: 1.0
    env_file:
      - ./.env
    environment:
      DJANGO_MIGRATE: "1"
      DJANGO_DATABASE_URL: ${DJANGO_DATABASE_URL:?DJANGO_DATABASE_URL is required}
    ports:
      - "8107:8000"
    restart: unless-stopped
    volumes:
      - ./data/controlnode/media:/app/media
      - ./data/controlnode/repo:/app/Araneae_repo/repo
    depends_on:
      rabbitmq:
        condition: service_healthy

  controlnode-worker:
    build:
      context: ./ControlNode
    mem_limit: 1536m
    cpus: 1.0
    env_file:
      - ./.env
    command: ["celery", "-A", "Araneae", "worker", "-l", "info"]
    environment:
      DJANGO_MIGRATE: "0"
      DJANGO_DATABASE_URL: ${DJANGO_DATABASE_URL:?DJANGO_DATABASE_URL is required}
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      controlnode:
        condition: service_healthy

  controlnode-beat:
    build:
      context: ./ControlNode
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - ./.env
    command:
      [
        "celery",
        "-A",
        "Araneae",
        "beat",
        "-l",
        "info",
        "--scheduler",
        "django_celery_beat.schedulers:DatabaseScheduler"
      ]
    environment:
      DJANGO_MIGRATE: "0"
      DJANGO_DATABASE_URL: ${DJANGO_DATABASE_URL:?DJANGO_DATABASE_URL is required}
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      controlnode:
        condition: service_healthy

  executionnode:
    build:
      context: ./ExecutionNode
    mem_limit: 2g
    cpus: 1.5
    env_file:
      - ./.env
    environment:
      EXECUTION_DATABASE_URL: ${EXECUTION_DATABASE_URL:?EXECUTION_DATABASE_URL is required}
    ports:
      - "4107:5001"
    restart: unless-stopped
    volumes:
      - ./data/executionnode/logs:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  front:
    build:
      context: ./Front
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - ./.env
    ports:
      - "5109:80"
    restart: unless-stopped
    depends_on:
      controlnode:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
