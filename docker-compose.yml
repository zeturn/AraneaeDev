services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 10s

  controlnode:
    image: golang:1.25
    working_dir: /app
    command: sh -c "go mod download && go run ./cmd/control"
    restart: unless-stopped
    volumes:
      - ./Backend:/app
      - ./Backend/data:/data
    environment:
      RABBITMQ_URL: ${CONTROL_RABBITMQ_URL:-amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      CONTROL_HTTP_ADDR: ${CONTROL_HTTP_ADDR:-:8180}
      CONTROL_GRPC_ADDR: ${CONTROL_GRPC_ADDR:-:9190}
      CONTROL_GRPC_TLS_ENABLED: ${CONTROL_GRPC_TLS_ENABLED:-false}
      CONTROL_GRPC_TLS_CERT_FILE: ${CONTROL_GRPC_TLS_CERT_FILE:-}
      CONTROL_GRPC_TLS_KEY_FILE: ${CONTROL_GRPC_TLS_KEY_FILE:-}
      CONTROL_GRPC_TLS_CLIENT_CA_FILE: ${CONTROL_GRPC_TLS_CLIENT_CA_FILE:-}
      CONTROL_DB_PATH: ${CONTROL_DB_PATH:-/data/control.db}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      EXECUTION_CALLBACK_KEY: ${EXECUTION_CALLBACK_KEY:?set EXECUTION_CALLBACK_KEY to a strong shared key}
      CONTROL_CORS_ALLOW_ORIGINS: ${CONTROL_CORS_ALLOW_ORIGINS:-http://localhost:5109,http://127.0.0.1:5109}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5109}
      BASALTPASS_BASE_URL: ${BASALTPASS_BASE_URL:-http://localhost:8101}
      BASALTPASS_INTERNAL_BASE_URL: ${BASALTPASS_INTERNAL_BASE_URL:-http://host.docker.internal:8101}
      BASALTPASS_OAUTH_ENABLED: ${BASALTPASS_OAUTH_ENABLED:-false}
      BASALTPASS_OAUTH_CLIENT_ID: ${BASALTPASS_OAUTH_CLIENT_ID:-}
      BASALTPASS_OAUTH_CLIENT_SECRET: ${BASALTPASS_OAUTH_CLIENT_SECRET:-}
      BASALTPASS_OAUTH_REDIRECT_URI: ${BASALTPASS_OAUTH_REDIRECT_URI:-http://localhost:8180/api/auth/basaltpass/callback/}
      BASALTPASS_OAUTH_SCOPE: ${BASALTPASS_OAUTH_SCOPE:-openid profile email}
      BASALTPASS_FRONTEND_CALLBACK_PATH: ${BASALTPASS_FRONTEND_CALLBACK_PATH:-/oauth/callback}
    ports:
      - "${CONTROL_HTTP_PORT:-8180}:8180"
      - "${CONTROL_GRPC_PORT:-9190}:9190"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8180; printf \"GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  executionnode:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        TARGET: executor
    user: "0:0"
    restart: unless-stopped
    volumes:
      - ./Backend/data:/data
    environment:
      RABBITMQ_URL: ${EXECUTOR_RABBITMQ_URL:-amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      EXECUTOR_HTTP_ADDR: ${EXECUTOR_HTTP_ADDR:-:4280}
      EXECUTOR_DB_PATH: ${EXECUTOR_DB_PATH:-/data/executor.db}
      EXECUTOR_WORKDIR: ${EXECUTOR_WORKDIR:-/data/workdir}
      EXECUTOR_QUEUE: ${EXECUTOR_QUEUE:-default}
      EXECUTOR_NODE_KEY_FILE: ${EXECUTOR_NODE_KEY_FILE:-/data/executor.node.key}
      CONTROL_GRPC_TARGET: ${EXECUTOR_CONTROL_GRPC_TARGET:-controlnode:9190}
      EXECUTOR_CONTROL_GRPC_TLS_ENABLED: ${EXECUTOR_CONTROL_GRPC_TLS_ENABLED:-false}
      EXECUTOR_CONTROL_GRPC_TLS_CA_FILE: ${EXECUTOR_CONTROL_GRPC_TLS_CA_FILE:-}
      EXECUTOR_CONTROL_GRPC_TLS_SERVER_NAME: ${EXECUTOR_CONTROL_GRPC_TLS_SERVER_NAME:-}
      EXECUTOR_GRPC_TLS_CERT_FILE: ${EXECUTOR_GRPC_TLS_CERT_FILE:-}
      EXECUTOR_GRPC_TLS_KEY_FILE: ${EXECUTOR_GRPC_TLS_KEY_FILE:-}
      CONTROL_HTTP_BASE: ${EXECUTOR_CONTROL_HTTP_BASE:-http://controlnode:8180}
      EXECUTION_CALLBACK_KEY: ${EXECUTION_CALLBACK_KEY:?set EXECUTION_CALLBACK_KEY to match control side}
    ports:
      - "${EXECUTOR_HTTP_PORT:-4280}:4280"
    depends_on:
      rabbitmq:
        condition: service_healthy
      controlnode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/4280; printf \"GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  front:
    build:
      context: ./Frontend
      args:
        VITE_BACKEND_BASE_URL: ${FRONT_VITE_BACKEND_BASE_URL:-http://localhost:8180}
        VITE_API_FLAVOR: ${FRONT_VITE_API_FLAVOR:-go}
    restart: unless-stopped
    ports:
      - "${FRONT_HTTP_PORT:-5109}:80"
    depends_on:
      controlnode:
        condition: service_healthy
