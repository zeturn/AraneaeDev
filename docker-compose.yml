services:
  controlnode:
    build:
      context: ./ControlNode
    env_file:
      - ./.env
    ports:
      - "8107:8000"
    restart: unless-stopped
    environment:
      DJANGO_MIGRATE: "1"
    volumes:
      - ./data/controlnode:/data
      - ./data/controlnode/media:/app/media
      - ./data/controlnode/repo:/app/Araneae_repo/repo
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/api/schema/',timeout=5);sys.exit(0)"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy

  controlnode-worker:
    build:
      context: ./ControlNode
    env_file:
      - ./.env
    command: ["celery", "-A", "Araneae", "worker", "-l", "info"]
    restart: unless-stopped
    environment:
      DJANGO_MIGRATE: "0"
    volumes:
      - ./data/controlnode:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      controlnode:
        condition: service_healthy

  controlnode-beat:
    build:
      context: ./ControlNode
    env_file:
      - ./.env
    command:
      [
        "celery",
        "-A",
        "Araneae",
        "beat",
        "-l",
        "info",
        "--scheduler",
        "django_celery_beat.schedulers:DatabaseScheduler"
      ]
    restart: unless-stopped
    environment:
      DJANGO_MIGRATE: "0"
    volumes:
      - ./data/controlnode:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      controlnode:
        condition: service_healthy

  executionnode:
    build:
      context: ./ExecutionNode
    env_file:
      - ./.env
    ports:
      - "4107:5001"
    restart: unless-stopped
    volumes:
      - ./data/executionnode:/data
      - ./data/executionnode/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request;urllib.request.urlopen('http://127.0.0.1:5001/health',timeout=5);sys.exit(0)"]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 35s
    depends_on:
      rabbitmq:
        condition: service_healthy

  front:
    build:
      context: ./Front
    env_file:
      - ./.env
    ports:
      - "5109:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    depends_on:
      controlnode:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
